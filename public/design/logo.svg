<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fbe08c"/>
      <stop offset="50%" stop-color="#d49a21"/>
      <stop offset="100%" stop-color="#966b11"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d49a21" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d49a21" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="84" stroke="url(#goldGrad)" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Glow fill -->
  <circle cx="100" cy="100" r="84" fill="url(#innerGlow)"/>

  <!-- Decorative tick marks -->
  <g stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5">
    <line x1="100" y1="5" x2="100" y2="16"/>
    <line x1="100" y1="184" x2="100" y2="195"/>
    <line x1="5" y1="100" x2="16" y2="100"/>
    <line x1="184" y1="100" x2="195" y2="100"/>
    <line x1="29.3" y1="29.3" x2="37.1" y2="37.1"/>
    <line x1="162.9" y1="162.9" x2="170.7" y2="170.7"/>
    <line x1="170.7" y1="29.3" x2="162.9" y2="37.1"/>
    <line x1="37.1" y1="162.9" x2="29.3" y2="170.7"/>
  </g>

  <!-- Beer mug body -->
  <g filter="url(#glow)">
    <path d="M72 70 L80 148 Q80 154 87 154 L117 154 Q124 154 124 148 L132 70 Z"
          fill="url(#goldGrad)" opacity="0.9"/>
    <!-- Handle -->
    <path d="M124 82 Q148 82 148 104 Q148 126 124 126"
          stroke="url(#goldGrad)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Foam top -->
    <ellipse cx="88" cy="70" rx="6" ry="8" fill="white" opacity="0.85"/>
    <ellipse cx="100" cy="66" rx="7" ry="9" fill="white" opacity="0.9"/>
    <ellipse cx="112" cy="70" rx="6" ry="8" fill="white" opacity="0.85"/>
    <ellipse cx="96" cy="69" rx="5" ry="7" fill="white" opacity="0.7"/>
    <ellipse cx="105" cy="67" rx="5" ry="7" fill="white" opacity="0.75"/>
    <!-- Beer liquid highlight -->
    <path d="M80 88 Q100 82 124 88" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="175" font-family="'Georgia', serif" font-size="11" font-weight="700"
        letter-spacing="6" text-anchor="middle" fill="url(#goldGrad)" opacity="0.8">TVÅDJE</text>
</svg>
